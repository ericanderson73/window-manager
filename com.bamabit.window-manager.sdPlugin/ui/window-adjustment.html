<!DOCTYPE html>
<html>
	<head lang="en">
		<title>Window Adjustment Settings</title>
		<meta charset="utf-8" />
		<script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
	</head>
	<body>
		<sdpi-item label="Pixels per tick">
			<sdpi-range setting="step" min="1" max="200" step="1" default="20" showlabels></sdpi-range>
		</sdpi-item>
		<sdpi-item label="Touchscreen background">
			<sdpi-color setting="backgroundColor" default="#000000"></sdpi-color>
		</sdpi-item>
		<sdpi-item>
			<small>Default: transparent.</small>
		</sdpi-item>
		<sdpi-item>
			<small>Hold the dial while turning to adjust by 5× this value.</small>
		</sdpi-item>
	</body>
</html>
